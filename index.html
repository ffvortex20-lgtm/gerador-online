<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX SYSTEM | AUTO-KEY</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Configuração do seu Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyACGn5I--vTEmJ6eijN2lytZiMgo2ElnW4",
            authDomain: "vortexdev2.firebaseapp.com",
            databaseURL: "https://vortexdev2-default-rtdb.firebaseio.com",
            projectId: "vortexdev2",
            storageBucket: "vortexdev2.firebasestorage.app",
            appId: "1:755839099190:android:f97e6d0dc860177306d397"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch { return "0.0.0.0"; }
        }

        async function gerarOuRecuperarKey() {
            const btn = document.getElementById('btnAction');
            const keyText = document.getElementById('keyDisplay');
            const msg = document.getElementById('statusMsg');
            
            btn.disabled = true;
            msg.innerText = "Verificando credenciais...";

            const ip = await getIP();
            // Criamos um ID único baseado no IP e informações do hardware (Simulando bloqueio por "IMEI/IP")
            const deviceFingerprint = btoa(ip + navigator.userAgent).substring(0, 20).replace(/[/+=]/g, "");
            
            const dbRef = ref(db);
            const agora = Date.now();
            const vinteQuatroHoras = 24 * 60 * 60 * 1000;

            try {
                const snapshot = await get(child(dbRef, `KeysUsers/${deviceFingerprint}`));
                
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const dataCriacao = parseInt(data.dias);
                    const tempoRestante = (dataCriacao + vinteQuatroHoras) - agora;

                    if (tempoRestante > 0) {
                        const horas = Math.floor(tempoRestante / (1000 * 60 * 60));
                        const mins = Math.floor((tempoRestante % (1000 * 60 * 60)) / (1000 * 60));
                        
                        exibirKey(data.key);
                        msg.innerHTML = `VOCÊ JÁ GEROU UMA KEY!<br>Nova geração disponível em: <b>${horas}h ${mins}m</b>`;
                        btn.disabled = false;
                        return;
                    }
                }

                // GERAR NOVA KEY (vtx-dev- + 4 números aleatórios)
                const novaKey = "vtx-dev-" + Math.floor(1000 + Math.random() * 9000);
                
                // Formato idêntico à foto 1
                const dadosUsuario = {
                    device: navigator.userAgent + " | IP: " + ip,
                    dias: agora.toString(),
                    dispositivos: "1",
                    key: novaKey,
                    status: "ativada",
                    uid: deviceFingerprint,
                    validade: "1"
                };

                await set(ref(db, `KeysUsers/${deviceFingerprint}`), dadosUsuario);
                
                exibirKey(novaKey);
                msg.innerText = "KEY GERADA COM SUCESSO!";
                btn.disabled = false;

            } catch (e) {
                msg.innerText = "Erro de conexão com Firebase.";
                btn.disabled = false;
            }
        }

        function exibirKey(key) {
            const el = document.getElementById('keyDisplay');
            el.innerText = key;
            el.parentElement.classList.add('active');
            navigator.clipboard.writeText(key);
        }

        window.gerarOuRecuperarKey = gerarOuRecuperarKey;
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            margin: 0; padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .card {
            width: 350px;
            padding: 30px;
            background: rgba(15, 15, 20, 0.95);
            border: 2px solid #00ccff;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px #00ccff55;
            position: relative;
        }

        h2 { color: #00ccff; text-shadow: 0 0 10px #00ccff; margin-bottom: 25px; }

        .key-container {
            background: #000;
            border: 1px solid #333;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            display: none;
        }

        .key-container.active { display: block; border-color: #00ff88; animation: pulse 2s infinite; }

        #keyDisplay { color: #00ff88; font-size: 1.2rem; font-weight: bold; }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #0077ff, #00ccff);
            border: none; color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold; cursor: pointer;
            border-radius: 8px; transition: 0.3s;
        }

        button:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 0 15px #0077ff; }
        button:disabled { background: #333; cursor: not-allowed; }

        .status-msg { margin-top: 20px; font-size: 0.8rem; color: #888; line-height: 1.4; }

        @keyframes pulse {
            0% { box-shadow: 0 0 5px #00ff8855; }
            50% { box-shadow: 0 0 15px #00ff8888; }
            100% { box-shadow: 0 0 5px #00ff8855; }
        }
    </style>
</head>
<body>

<div class="card">
    <h2>VORTEX AUTH</h2>
    
    <div class="key-container">
        <span id="keyDisplay"></span>
    </div>

    <button id="btnAction" onclick="gerarOuRecuperarKey()">GERAR KEY 24H</button>
    
    <div id="statusMsg" class="status-msg">
        O sistema identifica seu IP e Dispositivo para evitar múltiplos acessos.
    </div>
</div>

</body>
</html>
