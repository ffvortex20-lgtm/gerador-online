<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX SYSTEM | AUTO-KEY</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACGn5I--vTEmJ6eijN2lytZiMgo2ElnW4",
            authDomain: "vortexdev2.firebaseapp.com",
            databaseURL: "https://vortexdev2-default-rtdb.firebaseio.com",
            projectId: "vortexdev2",
            storageBucket: "vortexdev2.firebasestorage.app",
            appId: "1:755839099190:android:f97e6d0dc860177306d397"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch { return "0.0.0.0"; }
        }

        async function gerarOuRecuperarKey() {
            const btn = document.getElementById('btnAction');
            const msg = document.getElementById('statusMsg');
            
            btn.disabled = true;
            msg.innerText = "Validando dispositivo e IP...";

            const ip = await getIP();
            // Gera um ID único baseado no navegador + IP para evitar múltiplas gerações no mesmo PC/Celular
            const deviceFingerprint = btoa(ip + navigator.userAgent).substring(0, 15).replace(/[/+=]/g, "");
            
            const dbRef = ref(db);
            const agora = Date.now();
            const vinteQuatroHorasEmMs = 24 * 60 * 60 * 1000;

            try {
                const snapshot = await get(child(dbRef, `KeysUsers/${deviceFingerprint}`));
                
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const dataCriacao = parseInt(data.dias); // Recupera o timestamp de quando a key foi criada
                    const tempoPassado = agora - dataCriacao;

                    // Se ainda não passou 24 horas, devolve a mesma Key
                    if (tempoPassado < vinteQuatroHorasEmMs) {
                        const tempoRestante = vinteQuatroHorasEmMs - tempoPassado;
                        const horas = Math.floor(tempoRestante / (1000 * 60 * 60));
                        const mins = Math.floor((tempoRestante % (1000 * 60 * 60)) / (1000 * 60));
                        
                        exibirKey(data.key);
                        msg.innerHTML = `VOCÊ JÁ POSSUI UMA KEY ATIVA!<br>Expira em: <b>${horas}h ${mins}m</b>`;
                        btn.disabled = false;
                        return;
                    }
                }

                // Se não existe ou a antiga expirou, gera uma nova de 1 dia (24h)
                const novaKey = "vtx-free-" + Math.floor(10000 + Math.random() * 90000);
                
                const dadosUsuario = {
                    device: ip,
                    dias: agora.toString(), // Salva o momento exato da criação
                    dispositivos: "1",
                    key: novaKey,
                    status: "ativada",
                    uid: deviceFingerprint,
                    validade: "1" // Define como 1 dia
                };

                await set(ref(db, `KeysUsers/${deviceFingerprint}`), dadosUsuario);
                
                exibirKey(novaKey);
                msg.innerHTML = "<span style='color: #00ff88'>NOVA KEY GERADA E COPIADA!</span>";
                btn.disabled = false;

            } catch (e) {
                console.error(e);
                msg.innerText = "Erro ao conectar com o banco de dados.";
                btn.disabled = false;
            }
        }

        function exibirKey(key) {
            const el = document.getElementById('keyDisplay');
            el.innerText = key;
            document.querySelector('.key-container').classList.add('active');
            navigator.clipboard.writeText(key);
        }

        window.gerarOuRecuperarKey = gerarOuRecuperarKey;
    </script>

    <style>

        @keyframes neonGlow {
